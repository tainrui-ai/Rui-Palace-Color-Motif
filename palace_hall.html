<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕊宫 · 灵犀鉴大千色域 | RUI PALACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #B22222; /* 大唐朱砂红 */
            font-family: "Didot", "Bodoni MT", "Garamond", "Baskerville", "Georgia", "Songti SC", "SimSun", serif;
            user-select: none;
        }

        #stage-container {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0;
        }

        #baoxiang-img {
            position: absolute;
            width: 70vmin;
            height: 70vmin;
            object-fit: contain;
            pointer-events: none;
            animation: slowRotate 140s linear infinite;
            z-index: 1;
            box-shadow: 0 0 60px rgba(0,0,0,0.35);
            border-radius: 50%;
            transition: all 0.8s ease-in-out;
        }

        #inkCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen; 
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-logo {
            font-family: "Didot", "Bodoni MT", "Times New Roman", "Songti SC", serif;
            font-size: 2.8rem; 
            font-weight: 300;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .sub-brand {
            font-family: "Garamond", "Baskerville", "Georgia", serif;
            font-style: italic;
        }

        .side-panel {
            position: absolute;
            top: 0;
            width: 420px;
            height: 100%;
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(40px);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.2);
            z-index: 30;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .pattern-panel { left: -450px; border-right: 1px solid rgba(255, 255, 255, 0.6); }
        .pattern-panel.open { left: 0; }

        .color-pool-panel { right: -450px; border-left: 1px solid rgba(255, 255, 255, 0.6); }
        .color-pool-panel.open { right: 0; }

        .pool-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }
        .pool-card:hover {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }
        .pattern-card:hover { transform: translateX(5px); }
        .color-card:hover { transform: translateX(-5px); }

        .poetry-reflection {
            font-family: "Garamond", "Georgia", "KaiTi", serif;
            transition: all 0.8s ease-in-out;
        }

        .lang-switch {
            font-family: "Didot", "Bodoni MT", serif;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.4s;
        }
        .lang-switch:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #B22222;
            font-weight: bold;
        }
    </style>
</head>
<body class="relative flex flex-col justify-between h-screen w-screen" onclick="closeAllPanels()">

    <!-- 舞台核心区 -->
    <div id="stage-container">
        <img id="baoxiang-img" src="images/baoxianghua.jpg" onerror="this.src='https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop';" alt="核心纹样">
        <canvas id="inkCanvas"></canvas>
    </div>

    <!-- 顶部导航 -->
    <header class="w-full max-w-7xl mx-auto px-12 py-12 flex justify-between items-start z-10">
        <div class="flex flex-col space-y-3 pointer-events-none">
            <h1 class="brand-logo text-amber-200 tracking-[0.4em]">
                <span data-zh="蕊宫 · 灵犀鉴" data-en="Rui Palace · Lingxi">蕊宫 · 灵犀鉴</span>
            </h1>
            <div class="flex space-x-6 text-sm tracking-[0.2em] text-amber-100/70 font-light transition-colors duration-1000">
                <span id="current-pattern-name" data-zh="当前境象：经典宝相花" data-en="Pattern: Sacred Flower">当前境象：经典宝相花</span>
                <span>|</span>
                <span id="current-color-name" data-zh="当前色域：宝相大红底蕴" data-en="Current Realm: Vermilion Resonance">当前色域：宝相大红底蕴</span>
            </div>
        </div>
        
        <button onclick="toggleLanguage(event)" id="langBtn" class="lang-switch text-xs tracking-[0.2em] px-6 py-2.5 rounded-full font-light shadow-md">
            EN / 中
        </button>
    </header>

    <!-- 动态诗词 -->
    <div id="poem-container" class="absolute left-12 bottom-28 z-10 pointer-events-none max-w-xl transition-all duration-500">
        <p id="left-poem" class="poetry-reflection text-xs tracking-[0.25em] text-amber-100/90 font-light leading-relaxed" 
           data-zh="金丝作骨，宝相自开。九天阊阖开宫殿，万国衣冠拜冕旟。" 
           data-en="Golden threads define the bones; the sacred flower blooms in quiet splendor. The grand gates open to the world.">
            金丝作骨，宝相自开。九天阊阖开宫殿，万国衣冠拜冕旟。
        </p>
    </div>

    <!-- 左翼触发 -->
    <div class="absolute left-0 top-1/3 z-20" onclick="event.stopPropagation(); openPatternPool();">
        <button class="py-6 px-3 bg-white/80 hover:bg-white text-neutral-800 text-[10px] tracking-[0.4em] font-light rounded-r-2xl shadow-lg transition-all" style="writing-mode: vertical-rl;">
            📜 <span data-zh="大千纹样" data-en="PATTERN">大千纹样</span>
        </button>
    </div>

    <!-- 右翼触发 -->
    <div class="absolute right-0 top-1/3 z-20" onclick="event.stopPropagation(); openColorPool();">
        <button class="py-6 px-3 bg-white/80 hover:bg-white text-neutral-800 text-[10px] tracking-[0.4em] font-light rounded-l-2xl shadow-lg transition-all" style="writing-mode: vertical-rl;">
            🎨 <span data-zh="天然色池" data-en="PALETTE">天然色池</span>
        </button>
    </div>

<!-- 左侧：大千传统纹样池 -->
    <div id="patternPool" class="side-panel pattern-panel p-8 flex flex-col justify-between" onclick="event.stopPropagation()">
        <div class="flex flex-col flex-grow">
            <div class="flex justify-between items-baseline border-b border-neutral-200/60 pb-4 mb-4 flex-shrink-0">
                <h3 class="text-base font-light tracking-[0.4em] text-neutral-800" data-zh="大千传统纹样" data-en="HERITAGE MOTIFS">大千传统纹样</h3>
                <span class="text-[9px] text-neutral-400 tracking-wider sub-brand">SACRED MOTIFS</span>
            </div>
            <!-- 核心修复点：增加了高度限制和滚动条 -->
            <div class="space-y-4 overflow-y-auto pr-2 max-h-[calc(100vh-200px)]" id="pattern-list-container">
                <!-- 动态生成 -->
            </div>
        </div>
        <div class="border-t border-neutral-200/60 pt-6 text-center flex-shrink-0">
            <button onclick="closePatternPool()" class="text-[9px] tracking-[0.3em] text-neutral-400 hover:text-neutral-700 transition-colors uppercase">
                ✕ <span data-zh="收起纹样" data-en="Collapse">收起纹样</span>
            </button>
        </div>
    </div>

   
    <!-- 右侧：天然色彩池面板 -->
    <div id="colorPool" class="side-panel color-pool-panel p-8 flex flex-col justify-between" onclick="event.stopPropagation()">
        <div class="flex flex-col flex-grow">
            <div class="flex justify-between items-baseline border-b border-neutral-200/60 pb-4 mb-4 flex-shrink-0">
                <h3 class="text-base font-light tracking-[0.4em] text-neutral-800" data-zh="天然色彩池" data-en="NATURAL PALETTE">天然色彩池</h3>
                <span class="text-[9px] text-neutral-400 tracking-wider sub-brand">NATURAL REVELATION</span>
            </div>
            <!-- 核心修复点：增加了高度限制和滚动条 -->
            <div class="space-y-4 overflow-y-auto pr-2 max-h-[calc(100vh-200px)]" id="pool-list-container">
                <!-- 动态生成 -->
            </div>
        </div>
        <div class="border-t border-neutral-200/60 pt-6 text-center flex-shrink-0">
            <button onclick="closeColorPool()" class="text-[9px] tracking-[0.3em] text-neutral-400 hover:text-neutral-700 transition-colors uppercase">
                ✕ <span data-zh="收起色池" data-en="Collapse">收起色池</span>
            </button>
        </div>
    </div>

    <!-- 底部控制 -->


    <script>
        const canvas = document.getElementById('inkCanvas');
        const ctx = canvas.getContext('2d');
        let currentLang = 'zh';

        // 升级资产逻辑：注入高精度网络图作为安全兜底
        // 1. 升级版数据资产：为每一张图都配置绝对可靠的网络兜底图
        const orientalPatterns = [
            {
                name_zh: "经典宝相花", name_en: "Sacred Baoxiang", img: "images/baoxianghua.jpg",
                backup: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop",
                desc_zh: "大唐卷草与莲花交融之作，独具端庄与圆融之美。",
                desc_en: "The integration of Tang dynasty scrolls and lotus flower, presenting supreme dignity.",
                poetry_zh: "金丝作骨，宝相自开。九天阊阖开宫殿，万国衣冠拜冕旟。",
                poetry_en: "Golden threads define the bones; the sacred flower blooms in quiet splendor."
            },
            {
                name_zh: "敦煌大藻井", name_en: "Dunhuang Caisson", img: "images/zaojing.jpg",
                backup: "https://images.unsplash.com/photo-1561214115-f2f134cc4912?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "高昌及盛唐莫高窟窟顶核心华彩，层叠方井演化宇宙秩序。",
                desc_en: "The core masterwork of Dunhuang cave ceilings, forming cosmic order via square structures.",
                poetry_zh: "宛转回莲层叠影，丹青画壁步天台。", poetry_en: "Layered lotuses rotate in shadows; painted murals pave paths to heaven."
            },
            {
                name_zh: "盛唐忍冬纹", name_en: "Tang Honeysuckle", img: "images/rendong.jpg",
                backup: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "丝路东传的经典藤蔓纹，叶片三裂，连绵不绝象征永生。",
                desc_en: "Classic Silk Road vine motif, three-lobed leaves symbolizing continuous vitality.",
                poetry_zh: "蔓草绵延成造化，清风拂过尽婀娜。", poetry_en: "Endless vines form nature’s craft; gentle breeze evokes endless grace."
            },
            {
                name_zh: "盛唐忍冬纹", name_en: "Tang Honeysuckle", img: "images/rendong.jpg",
                backup: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "丝路东传的经典藤蔓纹，叶片三裂，连绵不绝象征永生。",
                desc_en: "Classic Silk Road vine motif, three-lobed leaves symbolizing continuous vitality.",
                poetry_zh: "蔓草绵延成造化，清风拂过尽婀娜。", poetry_en: "Endless vines form nature’s craft; gentle breeze evokes endless grace."
            },
            {
                name_zh: "盛唐忍冬纹", name_en: "Tang Honeysuckle", img: "images/rendong.jpg",
                backup: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "丝路东传的经典藤蔓纹，叶片三裂，连绵不绝象征永生。",
                desc_en: "Classic Silk Road vine motif, three-lobed leaves symbolizing continuous vitality.",
                poetry_zh: "蔓草绵延成造化，清风拂过尽婀娜。", poetry_en: "Endless vines form nature’s craft; gentle breeze evokes endless grace."
            },
            {
                name_zh: "盛唐忍冬纹", name_en: "Tang Honeysuckle", img: "images/rendong.jpg",
                backup: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "丝路东传的经典藤蔓纹，叶片三裂，连绵不绝象征永生。",
                desc_en: "Classic Silk Road vine motif, three-lobed leaves symbolizing continuous vitality.",
                poetry_zh: "蔓草绵延成造化，清风拂过尽婀娜。", poetry_en: "Endless vines form nature’s craft; gentle breeze evokes endless grace."
            }



        

];

        // 注入带有 url 跳转属性的升级色彩数据源
        const orientalPalettes = [

 { 
                name_zh: "朱砂红", name_en: "Turquoise", hex: "#4AA9A4", 
                origin_zh: "源自天然绿松石的冷翠，与大红完美撞色。", origin_en: "Mineral shade from natural turquoise.",
                url: "Color_Xue_Tao_Red.html"
            },
 { 
                name_zh: "绿松翠", name_en: "Turquoise", hex: "#4AA9A4", 
                origin_zh: "源自天然绿松石的冷翠，与大红完美撞色。", origin_en: "Mineral shade from natural turquoise.",
                url: "Color_LvSongCui.html"
            },
 { 
                name_zh: "绿松翠", name_en: "Turquoise", hex: "#4AA9A4", 
                origin_zh: "源自天然绿松石的冷翠，与大红完美撞色。", origin_en: "Mineral shade from natural turquoise.",
                url: "Color_Xue_Tao_Red.html"
            },
            { 
                name_zh: "绿松翠", name_en: "Turquoise", hex: "#4AA9A4", 
                origin_zh: "源自天然绿松石的冷翠，与大红完美撞色。", origin_en: "Mineral shade from natural turquoise.",
                url: "Color_LvSongCui.html"
            },
            { 
                name_zh: "青金蓝", name_en: "Lapis Blue", hex: "#2A4B7C", 
                origin_zh: "宝石般的靛蓝色，锁住了全图的精神法界。", origin_en: "Jewel-like indigo that anchors the realm.",
                url: "Color_QingJinLan.html"
            },
            { 
                name_zh: "蛤白叠", name_en: "Clam White", hex: "#EAE5D9", 
                origin_zh: "采用天然贝壳粉质感，提供关键隔离与呼吸。", origin_en: "Delicate shell white offering space to breathe.",
                url: "Color_HaBaiDie.html"
            },
            { 
                name_zh: "泥金线", name_en: "Liquid Gold", hex: "#D4AF37", 
                origin_zh: "盛唐掐丝骨架，将色域限制在严明法度之内。", origin_en: "Golden threads profiling framing the law.",
                url: "Color_NiJinXian.html"
            }
        ];

        let drops = []; let ripples = []; let backgroundFlows = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function renderPatternPool() {
            const container = document.getElementById('pattern-list-container');
            container.innerHTML = orientalPatterns.map((item, idx) => `
                <div class="pool-card pattern-card rounded-2xl p-4 flex flex-col space-y-2" onclick="selectPattern(${idx})">
                    <div class="text-sm font-medium text-neutral-800 tracking-widest sub-brand">
                        ${currentLang === 'zh' ? item.name_zh : item.name_en}
                    </div>
                    <p class="text-[11px] text-neutral-600 font-light leading-relaxed">
                        ${currentLang === 'zh' ? item.desc_zh : item.desc_en}
                    </p>
                </div>
            `).join('');
        }

        function renderColorPool() {
            const container = document.getElementById('pool-list-container');
            container.innerHTML = orientalPalettes.map((item, idx) => `
                <div class="pool-card color-card rounded-2xl p-4 flex flex-col space-y-2" onclick="selectPaletteFromPool(${idx})">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-3">
                            <span class="w-4 h-4 rounded-full shadow-inner" style="background-color: ${item.hex}"></span>
                            <span class="text-sm font-medium text-neutral-800 tracking-widest sub-brand">${currentLang === 'zh' ? item.name_zh : item.name_en}</span>
                        </div>
                        <span class="text-[10px] font-mono text-neutral-400">${item.hex}</span>
                    </div>
                    <p class="text-[11px] text-neutral-600 font-light leading-relaxed">
                        ${currentLang === 'zh' ? item.origin_zh : item.origin_en}
                    </p>
                </div>
            `).join('');
        }

        function selectPattern(index) {
            const pattern = orientalPatterns[index];
            const imgEl = document.getElementById('baoxiang-img');
            
            imgEl.onerror = null; 
            imgEl.style.opacity = '0';
            
            setTimeout(() => {
                imgEl.onerror = function() {
                    this.src = pattern.backup;
                };
                
                imgEl.src = pattern.img;
                imgEl.style.opacity = '1';
            }, 300);

            document.getElementById('current-pattern-name').innerText = currentLang === 'zh' ? `当前境象：${pattern.name_zh}` : `Pattern: ${pattern.name_en}`;
            
            const poemEl = document.getElementById('left-poem');
            poemEl.setAttribute('data-zh', pattern.poetry_zh);
            poemEl.setAttribute('data-en', pattern.poetry_en);
            poemEl.innerText = currentLang === 'zh' ? pattern.poetry_zh : pattern.poetry_en;
        }

        function openPatternPool() { closeColorPool(); document.getElementById('patternPool').classList.add('open'); }
        function closePatternPool() { document.getElementById('patternPool').classList.remove('open'); }
        function openColorPool() { closePatternPool(); document.getElementById('colorPool').classList.add('open'); }
        function closeColorPool() { document.getElementById('colorPool').classList.remove('open'); }
        function closeAllPanels() { closePatternPool(); closeColorPool(); }

        // 升级版色彩选择函数：兼顾动效渲染与延迟页面跳转
        function selectPaletteFromPool(index) {
            const data = orientalPalettes[index];
            
            // 1. 在屏幕中央渲染色彩激荡动效
            createImpact(canvas.width / 2, canvas.height / 2, data);
            
            // 2. 给予 500 毫秒视觉缓冲期，随之轻盈过渡至对应的独立空间
            if (data.url) {
                setTimeout(() => {
                    window.location.href = data.url;
                }, 500); 
            }
        }

        class WaterDrop {
            constructor(x, y, colorData) { this.x = x; this.y = 0; this.targetY = y; this.speed = 0; this.gravity = 0.3; this.size = 3; this.colorData = colorData; }
            update() { this.speed += this.gravity; this.y += this.speed; if (this.y >= this.targetY) { createImpact(this.x, this.targetY, this.colorData); return false; } return true; }
            draw() { ctx.save(); ctx.beginPath(); ctx.fillStyle = this.colorData.hex; ctx.ellipse(this.x, this.y, this.size, this.size * 2.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class ColorRipple {
            constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.radius = 1; this.maxRadius = Math.random() * 100 + 150; this.alpha = 0.8; }
            update() { this.radius += (this.maxRadius - this.radius) * 0.05; this.alpha -= 0.008; return this.alpha > 0; }
            draw() { ctx.save(); ctx.beginPath(); ctx.strokeStyle = this.color; ctx.globalAlpha = this.alpha; ctx.lineWidth = 3; ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
        }

        class LiquidFlow {
            constructor(x, y, colorData) { this.x = x; this.y = y; this.color = colorData.hex; this.radius = 0; this.maxRadius = Math.max(canvas.width, canvas.height) * 1.2; this.speed = 8; this.alpha = 0.4; }
            update() { this.radius += this.speed; if (this.radius >= this.maxRadius) { document.body.style.backgroundColor = this.color; this.alpha -= 0.015; } return this.alpha > 0; }
            draw() { ctx.save(); ctx.beginPath(); let gradient = ctx.createRadialGradient(this.x, this.y, this.radius * 0.1, this.x, this.y, this.radius); gradient.addColorStop(0, this.color); gradient.addColorStop(0.4, this.color + "44"); gradient.addColorStop(1, 'transparent'); ctx.fillStyle = gradient; ctx.globalAlpha = this.alpha; ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        function createImpact(x, y, colorData) {
            ripples.push(new ColorRipple(x, y, colorData.hex));
            backgroundFlows.push(new LiquidFlow(x, y, colorData));
            document.getElementById('current-color-name').innerText = currentLang === 'zh' ? `当前色域：${colorData.name_zh}` : `Current Realm: ${colorData.name_en}`;
        }

        window.addEventListener('click', (e) => {
            if (e.clientY < window.innerHeight - 120 && e.clientX > 430 && e.clientX < window.innerWidth - 430) {
                const randomColor = orientalPalettes[Math.floor(Math.random() * orientalPalettes.length)];
                drops.push(new WaterDrop(e.clientX, e.clientY, randomColor));
            }
        });

        function triggerManualDrop() {
            const rx = Math.random() * (canvas.width - 900) + 450;
            const ry = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.3);
            const randomColor = orientalPalettes[Math.floor(Math.random() * orientalPalettes.length)];
            drops.push(new WaterDrop(rx, ry, randomColor));
        }

        function clearCanvas() {
            drops = []; ripples = []; backgroundFlows = [];
            document.body.style.backgroundColor = "#B22222";
            document.getElementById('current-color-name').innerText = currentLang === 'zh' ? "当前色域：宝相大红底蕴" : "Current Realm: Vermilion Resonance";
            selectPattern(0);
            closeAllPanels();
        }

        function toggleLanguage(e) {
            e.stopPropagation();
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.querySelectorAll('[data-zh]').forEach(el => { el.innerText = el.getAttribute(`data-${currentLang}`); });
            renderPatternPool();
            renderColorPool();
        }

        renderPatternPool();
        renderColorPool();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            backgroundFlows = backgroundFlows.filter(flow => { const active = flow.update(); if (active) flow.draw(); return active; });
            ripples = ripples.filter(ripple => { const active = ripple.update(); if (active) ripple.draw(); return active; });
            drops = drops.filter(drop => { const active = drop.update(); if (active) drop.draw(); return active; });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
