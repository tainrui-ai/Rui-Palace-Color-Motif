<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕊宫 · 灵犀鉴大千色域 | RUI PALACE</title>
    
    <!-- 引入艺术与高奢级别 Google Fonts 字体库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #B22222; /* 大唐朱砂红 */
            font-family: "Montserrat", "Songti SC", "SimSun", serif;
            user-select: none;
        }

        #stage-container {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0;
        }

        #baoxiang-img {
            position: absolute;
            width: 70vmin;
            height: 70vmin;
            object-fit: contain;
            pointer-events: none;
            animation: slowRotate 140s linear infinite;
            z-index: 1;
            box-shadow: 0 0 60px rgba(0,0,0,0.35);
            border-radius: 50%;
            transition: all 0.8s ease-in-out;
        }

        #inkCanvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen; 
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-logo {
            font-family: "Cinzel", "Songti SC", serif;
            font-size: 2.8rem; 
            font-weight: 400;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .sub-brand {
            font-family: "Cinzel", serif;
            font-weight: 500;
        }

        /* 侧边弹窗 */
        .side-panel {
            position: absolute;
            top: 0;
            width: 420px;
            height: 100%;
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(40px);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.2);
            z-index: 30;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .pattern-panel { left: -450px; border-right: 1px solid rgba(255, 255, 255, 0.6); }
        .pattern-panel.open { left: 0; }

        .color-pool-panel { right: -450px; border-left: 1px solid rgba(255, 255, 255, 0.6); }
        .color-pool-panel.open { right: 0; }

        .pool-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }
        .pool-card:hover {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }
        .pattern-card:hover { transform: translateX(5px); }
        .color-card:hover { transform: translateX(-5px); }

        .poetry-reflection {
            font-family: "Montserrat", "KaiTi", "Songti SC", serif;
            transition: all 0.8s ease-in-out;
        }

        .lang-switch {
            font-family: "Cinzel", serif;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.4s;
        }
        .lang-switch:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #B22222;
            font-weight: bold;
        }

        .smart-glass-dock {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .smart-glass-dock button {
            transition: all 0.3s;
        }
        .smart-glass-dock button:hover {
            color: #FDEBC7;
            transform: translateY(-1px);
        }

        /* 法律声明侧边链接样式 */
        .legal-wing-link {
            text-decoration: none;
            color: #E8C3A7;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            font-weight: 300;
            opacity: 0.75;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .legal-wing-link:hover {
            opacity: 1;
            color: #FDEBC7;
            text-shadow: 0 0 8px rgba(253, 235, 199, 0.4);
        }
    </style>
</head>

<body class="relative flex flex-col justify-between h-screen w-screen" onclick="closeAllPanels()">

    <!-- 顶部导航 -->

        </button>
    </header>

    <!-- 动态诗词：自适应弹性布局，底部留出空间防遮挡 -->

    <!-- 左翼触发 -->
    <div class="absolute left-0 top-1/3 z-20" onclick="event.stopPropagation(); openPatternPool();">
        <button class="py-6 px-3 bg-white/80 hover:bg-white text-neutral-800 text-[10px] tracking-[0.4em] font-light rounded-r-2xl shadow-lg transition-all" style="writing-mode: vertical-rl;">
            📜 <span data-zh="大千纹样" data-en="PATTERN" class="data-[lang=en]:tracking-wider">大千纹样</span>

<!-- 彻底扁平化底座：控制面板居中，法律、版权、隐私在最底部完全平行 -->
    <footer class="w-full fixed bottom-0 left-0 z-10 px-12 pb-6 flex flex-col items-center space-y-4" onclick="event.stopPropagation()">
        
        <div class="w-full max-w-6xl flex justify-center items-center relative">
            <!-- 正中：磨砂控制面板 -->

                <span class="divider opacity-30">|</span>

        <!-- 底层全宽：法律、版权、隐私完全平行的一行 -->

            <!-- 正中的版权声明 -->
            <div class="w-2/4 text-center text-amber-100/40">
                © 2026 蕊宫 mail@rui-palace.com - <span class="tracking-normal font-normal">Rui Palace. All rights reserved.</span> 保持纯粹，珍藏人性。
            </div>

            <!-- 右平行的隐私政策 -->
            <div class="w-1/4 flex justify-end">
                <a href="Datenschutz.html" class="legal-wing-link text-[8px]">
                    隐私政策 <span class="tracking-normal font-normal ml-0.5">(Datenschutz)</span>

    <script>
        const canvas = document.getElementById('inkCanvas');
        const ctx = canvas.getContext('2d');
        let currentLang = 'zh';

        const orientalPatterns = [
            {
                name_zh: "经典宝相花", name_en: "Sacred Baoxiang", img: "images/baoxianghua.jpg",
                backup: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1000&auto=format&fit=crop",
                desc_zh: "大唐卷草与莲花交融之作，独具端庄与圆融之美。",
                desc_en: "The integration of Tang dynasty scrolls and lotus flower, presenting supreme dignity.",
                poetry_zh: "金丝作骨，宝相自开。九天阊阖开宫殿，万国衣冠拜冕旟。",
                poetry_en: "Golden threads define the bones; the sacred flower blooms in quiet splendor. The grand gates open to the world."
            },
            {
                name_zh: "敦煌大藻井", name_en: "Dunhuang Caisson", img: "images/zaojing.jpg",
                backup: "https://images.unsplash.com/photo-1561214115-f2f134cc4912?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "高昌及盛唐莫高窟窟顶核心华彩，层叠方井演化宇宙秩序。",
                desc_en: "The core masterwork of Dunhuang cave ceilings, forming cosmic order via square structures.",
                poetry_zh: "宛转回莲层叠影，丹青画壁步天台。", poetry_en: "Layered lotuses rotate in shadows; painted murals pave paths to heaven."
            },
            {
                name_zh: "盛唐忍冬纹", name_en: "Tang Honeysuckle", img: "images/rendong.jpg",
                backup: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop", 
                desc_zh: "丝路东传的经典藤蔓纹，叶片三裂，连绵不绝象征永生。",
                desc_en: "Classic Silk Road vine motif, three-lobed leaves symbolizing continuous vitality.",
                poetry_zh: "蔓草绵延成造化，清风拂过尽婀娜。", poetry_en: "Endless vines form nature’s craft; gentle breeze evokes endless grace."
            }
        ];

        const orientalPalettes = [
            { name_zh: "艾青 · 凝露白 ", name_en: "Mugwort Green", hex: "#4A6741", origin_zh: "正气化青，温婉入药。", origin_en: "Vital harmony distills into sapphire, while gentle elegance becomes the cure.", url: "Color Ai Qing.html" },
            { name_zh: "芭蕉橙 · 暖阳", name_en: "Plantain Orange", hex: "#D97706", origin_zh: "日光斜照芭蕉之脉络，取大地与韶华之暖色。", origin_en: "Warm hues from sunlit plantain leaves.", url: "Color Orange.html" },
            { name_zh: "紫菀 · 幽香", name_en: "Aster Purple", hex: "#A68BBD", origin_zh: "草木紫菀之幽远，将静谧与端庄沉淀于方寸间。", origin_en: "Distilled aster essence anchoring serene depths.", url: "Color Purple.html" },
            { name_zh: "涌帝青 · 奇峰", name_en: "Imperial Blue", hex: "#1E3A8A", origin_zh: "深邃如帝王法界之青，锁住全图的精神力量。", origin_en: "Deep imperial indigo carrying celestial order.", url: "Color Sky Blue.html?" },
            { name_zh: "雨过天晴 · 天青", name_en: "Sky Blue Celadon", hex: "#4B6674", origin_zh: "柴窑传世之大美，取雨后苍穹初开之温润。", origin_en: "Legendary celadon capturing post-rain sky clarity.", url: "Color Tian Qing.html" },
            { name_zh: "朱砂落 · 宫墙", name_en: "Cinnabar Red", hex: "#B12224", origin_zh: "大唐宫墙与汉玉凝脂之经典撞色，刚柔并济。", origin_en: "Classic contrast of palace red and jade cream.", url: "Color Zhu Sha Red.html" },
            { name_zh: "桃花红笺 · 流霞", name_en: "Peach Crimson", hex: "#E05263", origin_zh: "薛涛红笺之流霞，将诗意风骨熔铸为淡雅绯红。", origin_en: "Poetic letter paper stained with peach blossom hues.", url: "Color_Xue_Tao_Red.html" },
            { name_zh: "玄武黑 · 墨韵", name_en: "Xuanwu Obsidian", hex: "#1A1A1A", origin_zh: "五方正色之玄黑，如泼墨入水，沉稳内敛。", origin_en: "The deep obsidian black, representing timeless depth.", url: "Color Distant Mountain.html" },
            { name_zh: "琥珀金 · 金泽流光 ", name_en: "Amber Gold", hex: "#D4A017", origin_zh: "流光不掩本真，岁月沉淀清气。", origin_en: "Time’s shifting light cannot veil the true self; the passing years distill pure serenity.", url: "Color Amber Gold.html" },
            { name_zh: "杏花天 · 医道亦道 ", name_en: "Apricot Blossom Sky", hex: "#E9A68D", origin_zh: "杏花微雨霓裳舞，曾忆锦瑟五十弦?", origin_en: "Amidst the apricot blossoms and fine rain, the neon garments dance; do you still recall the fifty strings of the zither from seasons past?", url: "Color Apricot Blossom.html" },
            { name_zh: "暮山落 · 月独白 ", name_en: "Mushan Purple", hex: "#8670A0", origin_zh: "烟光凝而暮山紫，无尽夏开月独白。", origin_en: "Mist condenses as the evening mountains turn to aster purple，Endless summers bloom while the moon shines in solitary white.", url: "Color Mu Shan Lila.html" }
        ];

        let drops = []; let ripples = []; let backgroundFlows = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function renderPatternPool() {
            const container = document.getElementById('pattern-list-container');
            container.innerHTML = orientalPatterns.map((item, idx) => `
                <div class="pool-card pattern-card rounded-2xl p-4 flex flex-col space-y-2" onclick="selectPattern(${idx})">
                    <div class="text-sm font-medium text-neutral-800 tracking-widest sub-brand data-[lang=en]:tracking-wider" data-lang="${currentLang}">
                        ${currentLang === 'zh' ? item.name_zh : item.name_en}
                    </div>
                    <p class="text-[11px] text-neutral-600 font-light leading-relaxed data-[lang=en]:tracking-normal" data-lang="${currentLang}">
                        ${currentLang === 'zh' ? item.desc_zh : item.desc_en}
                    </p>
                </div>
            `).join('');
        }

        function renderColorPool() {
            const container = document.getElementById('pool-list-container');
            container.innerHTML = orientalPalettes.map((item, idx) => `
                <div class="pool-card color-card rounded-2xl p-4 flex flex-col space-y-2" onclick="selectPaletteFromPool(${idx})">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-3">
                            <span class="w-4 h-4 rounded-full shadow-inner" style="background-color: ${item.hex}"></span>
                            <span class="text-sm font-medium text-neutral-800 tracking-widest sub-brand data-[lang=en]:tracking-wider" data-lang="${currentLang}">${currentLang === 'zh' ? item.name_zh : item.name_en}</span>
                        </div>
                        <span class="text-[10px] font-mono text-neutral-400 tracking-normal">${item.hex}</span>
                    </div>
                    <p class="text-[11px] text-neutral-600 font-light leading-relaxed data-[lang=en]:tracking-normal" data-lang="${currentLang}">
                        ${currentLang === 'zh' ? item.origin_zh : item.origin_en}
                    </p>
                </div>
            `).join('');
        }

        function selectPattern(index) {
            const pattern = orientalPatterns[index];
            const imgEl = document.getElementById('baoxiang-img');
            imgEl.style.opacity = '0';
            setTimeout(() => {
                imgEl.onerror = function() { this.src = pattern.backup; };
                imgEl.src = pattern.img;
                imgEl.style.opacity = '1';
            }, 300);
            
            const nameEl = document.getElementById('current-pattern-name');
            nameEl.innerText = currentLang === 'zh' ? `当前境象：${pattern.name_zh}` : `Pattern: ${pattern.name_en}`;
            nameEl.setAttribute('data-lang', currentLang);

            const poemEl = document.getElementById('left-poem');
            poemEl.setAttribute('data-zh', pattern.poetry_zh);
            poemEl.setAttribute('data-en', pattern.poetry_en);
            poemEl.innerText = currentLang === 'zh' ? pattern.poetry_zh : pattern.poetry_en;
            poemEl.setAttribute('data-lang', currentLang);
        }

        function openPatternPool() { closeColorPool(); document.getElementById('patternPool').classList.add('open'); }
        function closePatternPool() { document.getElementById('patternPool').classList.remove('open'); }
        function openColorPool() { closePatternPool(); document.getElementById('colorPool').classList.add('open'); }
        function closeColorPool() { document.getElementById('colorPool').classList.remove('open'); }
        function closeAllPanels() { closePatternPool(); closeColorPool(); }

        function selectPaletteFromPool(index) {
            const data = orientalPalettes[index];
            createImpact(canvas.width / 2, canvas.height / 2, data);
            if (data.url) { setTimeout(() => { window.location.href = data.url; }, 600); }
        }

        class WaterDrop {
            constructor(x, y, colorData) { this.x = x; this.y = 0; this.targetY = y; this.speed = 0; this.gravity = 0.3; this.size = 3; this.colorData = colorData; }
            update() { this.speed += this.gravity; this.y += this.speed; if (this.y >= this.targetY) { createImpact(this.x, this.targetY, this.colorData); return false; } return true; }
            draw() { ctx.save(); ctx.beginPath(); ctx.fillStyle = this.colorData.hex; ctx.ellipse(this.x, this.y, this.size, this.size * 2.5, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class ColorRipple {
            constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.radius = 1; this.maxRadius = Math.random() * 100 + 150; this.alpha = 0.8; }
            update() { this.radius += (this.maxRadius - this.radius) * 0.05; this.alpha -= 0.008; return this.alpha > 0; }
            draw() { ctx.save(); ctx.beginPath(); ctx.strokeStyle = this.color; ctx.globalAlpha = this.alpha; ctx.lineWidth = 3; ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
        }

        class LiquidFlow {
            constructor(x, y, colorData) { this.x = x; this.y = y; this.color = colorData.hex; this.radius = 0; this.maxRadius = Math.max(canvas.width, canvas.height) * 1.2; this.speed = 8; this.alpha = 0.4; }
            update() { this.radius += this.speed; if (this.radius >= this.maxRadius) { document.body.style.backgroundColor = this.color; this.alpha -= 0.015; } return this.alpha > 0; }
            draw() { ctx.save(); ctx.beginPath(); let gradient = ctx.createRadialGradient(this.x, this.y, this.radius * 0.1, this.x, this.y, this.radius); gradient.addColorStop(0, this.color); gradient.addColorStop(0.4, this.color + "44"); gradient.addColorStop(1, 'transparent'); ctx.fillStyle = gradient; ctx.globalAlpha = this.alpha; ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        function createImpact(x, y, colorData) {
            ripples.push(new ColorRipple(x, y, colorData.hex));
            backgroundFlows.push(new LiquidFlow(x, y, colorData));
            const colorEl = document.getElementById('current-color-name');
            colorEl.innerText = currentLang === 'zh' ? `当前色域：${colorData.name_zh}` : `Current Realm: ${colorData.name_en}`;
            colorEl.setAttribute('data-lang', currentLang);
        }

        window.addEventListener('click', (e) => {
            if (e.clientY < window.innerHeight - 120 && e.clientX > 430 && e.clientX < window.innerWidth - 430) {
                const randomColor = orientalPalettes[Math.floor(Math.random() * orientalPalettes.length)];
                drops.push(new WaterDrop(e.clientX, e.clientY, randomColor));
            }
        });

        function triggerManualDrop() {
            const rx = Math.random() * (canvas.width - 900) + 450;
            const ry = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.3);
            const randomColor = orientalPalettes[Math.floor(Math.random() * orientalPalettes.length)];
            drops.push(new WaterDrop(rx, ry, randomColor));
        }

        function clearCanvas() {
            drops = []; ripples = []; backgroundFlows = [];
            document.body.style.backgroundColor = "#B22222";
            
            const colorEl = document.getElementById('current-color-name');
            colorEl.innerText = currentLang === 'zh' ? "当前色域：宝相大红底蕴" : "Current Realm: Vermilion Resonance";
            colorEl.setAttribute('data-lang', currentLang);
            
            selectPattern(0);
            closeAllPanels();
        }

        function toggleLanguage(e) {
            e.stopPropagation();
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
                el.setAttribute('data-lang', currentLang); // 动态改变属性让 Tailwind 控制间距
            });
            renderPatternPool();
            renderColorPool();
        }

        renderPatternPool();
        renderColorPool();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            backgroundFlows = backgroundFlows.filter(flow => { const active = flow.update(); if (active) flow.draw(); return active; });
            ripples = ripples.filter(ripple => { const active = ripple.update(); if (active) ripple.draw(); return active; });
            drops = drops.filter(drop => { const active = drop.update(); if (active) drop.draw(); return active; });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
